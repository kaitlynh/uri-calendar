name: Scrape and Ingest Events

on:
  schedule:
    # 3:00 AM UTC = ~5:00 AM Zurich (CET) / ~4:00 AM (CEST)
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scrape:
    name: Scrape event data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        env:
          EVENTFROG_API_KEY: ${{ secrets.EVENTFROG_API_KEY }}
        run: python scraping/scraping.py

      - name: Run AI enrichment
        # Optional — events are usable without AI. Don't block the pipeline.
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scraping/open-ai.py

      - name: Upload events artifact
        uses: actions/upload-artifact@v4
        with:
          name: events
          path: events/events.json
          retention-days: 1

  ingest:
    name: Ingest into database
    runs-on: ubuntu-latest
    needs: scrape

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download events artifact
        uses: actions/download-artifact@v4
        with:
          name: events
          path: events/

      - name: Open SSH tunnel to database
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh -f -N -L 5432:localhost:5432 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          sleep 2
          nc -z localhost 5432 || { echo "SSH tunnel failed to establish"; exit 1; }

      - name: Ingest into database
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: python db/parse_json.py

      - name: Push events.json to server
        run: scp events/events.json ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/uri-calendar/events/events.json

      - name: Close SSH tunnel
        if: always()
        run: pkill -f "ssh -f -N -L 5432" || true

  validate:
    name: Validate pipeline results
    runs-on: ubuntu-latest
    needs: ingest
    # Always run validation even if ingest fails, so we capture the state
    if: always() && needs.scrape.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download events artifact
        uses: actions/download-artifact@v4
        with:
          name: events
          path: events/

      - name: Open SSH tunnel to database
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh -f -N -L 5432:localhost:5432 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          sleep 2
          nc -z localhost 5432 || { echo "SSH tunnel failed to establish"; exit 1; }

      - name: Run pipeline validation
        id: pipeline_validate
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        # continue-on-error so the API validation still runs
        continue-on-error: true
        run: python tests/validate_pipeline.py 2>&1 | tee pipeline_output.txt

      - name: Close SSH tunnel
        if: always()
        run: pkill -f "ssh -f -N -L 5432" || true

      - name: Upload pipeline output
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-validation
          path: pipeline_output.txt
          retention-days: 7

  validate-api:
    name: Validate API on server
    runs-on: ubuntu-latest
    needs: [ingest, validate]
    # Run even if validate had failures
    if: always() && needs.ingest.result == 'success'

    steps:
      - name: Run API validation via SSH
        id: api_validate
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 2m
          script: |
            cd /opt/uri-calendar
            git pull origin main --quiet
            /opt/uri-calendar/scraping/.venv/bin/python tests/validate_api.py 2>&1

  report:
    name: Report results
    runs-on: ubuntu-latest
    needs: [validate, validate-api]
    if: always()

    steps:
      - name: Download pipeline output
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pipeline-validation
          path: .

      - name: Check for failures and create/update issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let pipelineOutput = '';
            try {
              pipelineOutput = fs.readFileSync('pipeline_output.txt', 'utf8');
            } catch (e) {
              pipelineOutput = '(pipeline validation output not available)';
            }

            // Check if any upstream job failed
            const validateResult = '${{ needs.validate.result }}';
            const apiResult = '${{ needs.validate-api.result }}';
            const pipelineStepResult = '${{ needs.validate.outputs.pipeline_validate_outcome || 'unknown' }}';

            const hasPipelineFailure = pipelineOutput.includes('[FAIL]');
            const hasApiFailure = apiResult === 'failure';
            const hasAnyFailure = hasPipelineFailure || hasApiFailure || validateResult === 'failure' || apiResult === 'failure';

            if (!hasAnyFailure) {
              console.log('All checks passed — no issue needed.');
              return;
            }

            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Extract [FAIL] lines and build a fingerprint for deduplication
            const failLines = pipelineOutput
              .split('\n')
              .filter(line => line.includes('[FAIL]'))
              .map(line => line.replace(/^\s*\[FAIL]\s*/, '').trim());

            // Build a short, readable title
            // Dedup uses the fingerprint (body FAIL lines), so the title
            // only needs to be human-scannable, not encode every failure.
            const failCount = failLines.length + (hasApiFailure ? 1 : 0);
            // Extract failed source domains for the title
            const failedSources = failLines
              .map(line => {
                const m = line.match(/\(([a-z0-9.-]+\.[a-z]+)\)$/);
                return m ? m[1] : null;
              })
              .filter(Boolean);

            let issueTitle;
            if (hasApiFailure && failLines.length === 0) {
              issueTitle = 'Pipeline failure: API validation';
            } else if (failedSources.length === 1) {
              issueTitle = `Pipeline failure: ${failedSources[0]}`;
            } else if (failedSources.length > 1) {
              issueTitle = `Pipeline failure: ${failedSources.join(', ')}`;
            } else {
              issueTitle = `Pipeline failure: ${failCount} check${failCount === 1 ? '' : 's'}`;
            }
            // Fingerprint = sorted fail lines, so order doesn't matter
            const fingerprint = failLines.slice().sort().join('\n');

            const issueBody = [
              '## Pipeline Validation (GitHub Actions)',
              '```',
              pipelineOutput,
              '```',
              '',
              `## API Validation (server-side)`,
              `See the [workflow run log](${runUrl}) → "Validate API on server" step for full output.`,
              '',
              `**Triggered by:** [workflow run](${runUrl})`,
            ].join('\n');

            // Search for existing open issues with the same failure fingerprint
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pipeline-failure',
              state: 'open',
              per_page: 20,
            });

            // Check if any open issue has the same set of failures
            for (const issue of openIssues) {
              // Extract [FAIL] lines from the issue body
              const existingFails = (issue.body || '')
                .split('\n')
                .filter(line => line.includes('[FAIL]'))
                .map(line => line.replace(/^\s*\[FAIL]\s*/, '').trim())
                .sort()
                .join('\n');

              if (existingFails === fingerprint) {
                // Same failures — add a comment instead of a new issue
                console.log(`Same failures as #${issue.number} — adding comment.`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: [
                    `## Still failing — ${today}`,
                    '',
                    `Same failures detected. [Workflow run](${runUrl})`,
                  ].join('\n'),
                });
                return;
              }
            }

            // Different failures (or no open issue) — create a new issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['pipeline-failure'],
            });
