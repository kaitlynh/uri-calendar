name: Scrape and Ingest Events

on:
  schedule:
    # 3:00 AM UTC = ~5:00 AM Zurich (CET) / ~4:00 AM (CEST)
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scrape:
    name: Scrape event data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        env:
          EVENTFROG_API_KEY: ${{ secrets.EVENTFROG_API_KEY }}
        run: python scraping/scraping.py

      - name: Run AI enrichment
        # Optional — events are usable without AI. Don't block the pipeline.
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scraping/open-ai.py

      - name: Upload events artifact
        uses: actions/upload-artifact@v4
        with:
          name: events
          path: events/events.json
          retention-days: 14

  ingest:
    name: Ingest into database
    runs-on: ubuntu-latest
    needs: scrape

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download events artifact
        uses: actions/download-artifact@v4
        with:
          name: events
          path: events/

      - name: Open SSH tunnel to database
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh -f -N -L 5432:localhost:5432 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          sleep 2
          nc -z localhost 5432 || { echo "SSH tunnel failed to establish"; exit 1; }

      - name: Ingest into database
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: python db/parse_json.py

      - name: Push events.json to server
        run: scp events/events.json ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/uri-calendar/events/events.json

      - name: Close SSH tunnel
        if: always()
        run: pkill -f "ssh -f -N -L 5432" || true

  validate:
    name: Validate pipeline results
    runs-on: ubuntu-latest
    needs: ingest
    # Always run validation even if ingest fails, so we capture the state
    if: always() && needs.scrape.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download events artifact
        uses: actions/download-artifact@v4
        with:
          name: events
          path: events/

      - name: Open SSH tunnel to database
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh -f -N -L 5432:localhost:5432 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          sleep 2
          nc -z localhost 5432 || { echo "SSH tunnel failed to establish"; exit 1; }

      - name: Run pipeline validation
        id: pipeline_validate
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        continue-on-error: true
        run: python tests/validate_pipeline.py 2>&1 | tee pipeline_output.txt

      - name: Close SSH tunnel
        if: always()
        run: pkill -f "ssh -f -N -L 5432" || true

      - name: Upload pipeline output
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-validation
          path: pipeline_output.txt
          retention-days: 14

  validate-api:
    name: Validate API on server
    runs-on: ubuntu-latest
    needs: [ingest, validate]
    # Run even if validate had failures
    if: always() && needs.ingest.result == 'success'

    steps:
      - name: Run API validation via SSH
        id: api_validate
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 2m
          script: |
            cd /opt/uri-calendar
            git pull origin main --quiet
            /opt/uri-calendar/scraping/.venv/bin/python tests/validate_api.py 2>&1

  report:
    name: Report results
    runs-on: ubuntu-latest
    needs: [validate, validate-api]
    if: always()

    steps:
      - name: Download pipeline output
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pipeline-validation
          path: .

      - name: Check for failures and create/update issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let pipelineOutput = '';
            try {
              pipelineOutput = fs.readFileSync('pipeline_output.txt', 'utf8');
            } catch (e) {
              pipelineOutput = '(pipeline validation output not available)';
            }

            const validateResult = '${{ needs.validate.result }}';
            const apiResult = '${{ needs.validate-api.result }}';
            const hasPipelineFailure = pipelineOutput.includes('[FAIL]');
            const hasApiFailure = apiResult === 'failure';
            const hasAnyFailure = hasPipelineFailure || hasApiFailure || validateResult === 'failure';

            if (!hasAnyFailure) {
              console.log('All checks passed — no issue needed.');
              return;
            }

            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Parse each [FAIL] line into one-or-more structured failures.
            // Each failure has a stable `key` used to dedupe against existing open issues.
            const failLines = pipelineOutput
              .split('\n')
              .filter(line => line.includes('[FAIL]'))
              .map(line => line.replace(/^\s*\[FAIL]\s*/, '').trim());

            const failures = [];

            if (hasApiFailure) {
              failures.push({
                key: 'api-validation',
                title: 'Pipeline failure: API validation (server-side)',
                detail: 'API validation failed. See workflow run → "Validate API on server" step for details.',
              });
            }

            for (const line of failLines) {
              // "Orphaned sources in DB (not in JSON): a.ch, b.ch, c.ch" — split into one issue per source
              let m = line.match(/^Orphaned sources in DB \(not in JSON\):\s*(.+)$/);
              if (m) {
                const sources = m[1].split(',').map(s => s.trim()).filter(Boolean);
                for (const source of sources) {
                  failures.push({
                    key: `orphaned-source:${source}`,
                    title: `Pipeline failure: orphaned source ${source}`,
                    detail: `Source \`${source}\` exists in the DB but is not present in the JSON output.`,
                  });
                }
                continue;
              }

              // "0 events from source: Display Name (domain.ch)"
              m = line.match(/^0 events from source:\s*.+\(([a-z0-9.-]+\.[a-z]+)\)\s*$/);
              if (m) {
                const source = m[1];
                failures.push({
                  key: `zero-events:${source}`,
                  title: `Pipeline failure: 0 events from ${source}`,
                  detail: line,
                });
                continue;
              }

              // "N events have invalid end_datetime format (...): source.ch: date, source.ch: date, ..."
              m = line.match(/^\d+ events have invalid end_datetime format[^:]*:\s*(.+)$/);
              if (m) {
                const sources = [...new Set(
                  m[1].split(',').map(part => {
                    const sm = part.trim().match(/^([a-z0-9.-]+\.[a-z]+):/);
                    return sm ? sm[1] : null;
                  }).filter(Boolean)
                )];
                if (sources.length) {
                  for (const source of sources) {
                    failures.push({
                      key: `invalid-end-datetime:${source}`,
                      title: `Pipeline failure: invalid end_datetime in ${source}`,
                      detail: line,
                    });
                  }
                } else {
                  failures.push({
                    key: 'invalid-end-datetime',
                    title: 'Pipeline failure: invalid end_datetime format',
                    detail: line,
                  });
                }
                continue;
              }

              // "N KBU events leaked through aggregator filters — e.g. ..."
              if (/^\d+ KBU events leaked through aggregator filters/.test(line)) {
                failures.push({
                  key: 'kbu-leak',
                  title: 'Pipeline failure: KBU events leaking through aggregator filters',
                  detail: line,
                });
                continue;
              }

              // "N Theater Uri events leaked through aggregator filters — e.g. ..."
              if (/^\d+ Theater Uri events leaked through aggregator filters/.test(line)) {
                failures.push({
                  key: 'theater-uri-leak',
                  title: 'Pipeline failure: Theater Uri events leaking through aggregator filters',
                  detail: line,
                });
                continue;
              }

              // "N duplicate title+date combinations in DB (unique constraint may be broken)"
              if (/^\d+ duplicate title\+date combinations in DB/.test(line)) {
                failures.push({
                  key: 'duplicate-titles',
                  title: 'Pipeline failure: duplicate title+date combinations in DB',
                  detail: line,
                });
                continue;
              }

              // "DB has fewer events (N) than JSON (M) — ingest may ..."
              if (/^DB has fewer events/.test(line)) {
                failures.push({
                  key: 'db-fewer-events-than-json',
                  title: 'Pipeline failure: DB has fewer events than JSON',
                  detail: line,
                });
                continue;
              }

              // Unknown failure shape — key off the line with volatile numbers/examples stripped.
              const normalized = line
                .replace(/\d+/g, 'N')
                .replace(/\s*—\s*e\.g\..*$/, '')
                .trim()
                .slice(0, 100);
              failures.push({
                key: `other:${normalized}`,
                title: `Pipeline failure: ${line.slice(0, 70)}`,
                detail: line,
              });
            }

            // Look up existing open issues with the pipeline-failure label.
            // The hidden key tag in the body is how we dedupe.
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pipeline-failure',
              state: 'open',
              per_page: 100,
            });

            const KEY_TAG = /<!--\s*failure-key:\s*([^\s]+)\s*-->/;
            const issuesByKey = new Map();
            for (const issue of openIssues) {
              const match = (issue.body || '').match(KEY_TAG);
              if (match) issuesByKey.set(match[1], issue);
            }

            // For each failure: if an open issue with the same key exists, comment on it.
            // Otherwise, open a new issue.
            for (const failure of failures) {
              const existing = issuesByKey.get(failure.key);
              if (existing) {
                console.log(`Failure "${failure.key}" still happening — commenting on #${existing.number}.`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: [
                    `## Still failing — ${today}`,
                    '',
                    '```',
                    failure.detail,
                    '```',
                    '',
                    `[Workflow run](${runUrl})`,
                  ].join('\n'),
                });
              } else {
                console.log(`New failure "${failure.key}" — opening issue.`);
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: failure.title,
                  body: [
                    `<!-- failure-key: ${failure.key} -->`,
                    `First seen: ${today}`,
                    '',
                    '```',
                    failure.detail,
                    '```',
                    '',
                    `[Workflow run](${runUrl})`,
                  ].join('\n'),
                  labels: ['pipeline-failure'],
                });
              }
            }
