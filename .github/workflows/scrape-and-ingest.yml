name: Scrape and Ingest Events

on:
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape event data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser openai python-dotenv

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVENTFROG_API_KEY: ${{ secrets.EVENTFROG_API_KEY }}
        run: |
          python scraping/scraping.py
          python scraping/open-ai.py

      - name: Upload events artifact
        uses: actions/upload-artifact@v4
        with:
          name: events
          path: events/events.json
          retention-days: 1

  ingest:
    name: Ingest into database
    runs-on: ubuntu-latest
    needs: scrape

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv

      - name: Download events artifact
        uses: actions/download-artifact@v4
        with:
          name: events
          path: events/

      - name: Ingest into database
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: python db/parse_json.py

  validate:
    name: Validate pipeline results
    runs-on: ubuntu-latest
    needs: ingest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv

      - name: Download events artifact
        uses: actions/download-artifact@v4
        with:
          name: events
          path: events/

      - name: Run validation
        id: validate
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: python tests/validate_pipeline.py 2>&1 | tee validation_output.txt

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('validation_output.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline validation failed — ${new Date().toISOString().split('T')[0]}`,
              body: `The scrape-and-ingest pipeline validation failed.\n\n\`\`\`\n${output}\n\`\`\`\n\nTriggered by workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug']
            });
