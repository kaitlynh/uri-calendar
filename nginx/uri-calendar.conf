limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    server_name urikalender.ch www.urikalender.ch;

    root /opt/uri-calendar/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/urikalender.ch/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/urikalender.ch/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.urikalender.ch) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = urikalender.ch) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name urikalender.ch www.urikalender.ch;
    return 404; # managed by Certbot
}
